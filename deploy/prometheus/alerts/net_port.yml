groups:
  - name: net_port
    rules:
      - alert: NetPortTargetDown
        expr: up{job="net_port"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: Net Port metrics target is down
          description: Prometheus cannot scrape net_port:8080/metrics for 2 minutes.

      - alert: NetPortHealthDegraded
        expr: net_port_health_ok == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: Net Port health check failing (HTTP 503)
          description: >-
            /health is degraded for 2+ minutes. Inspect net_port_check_database and
            net_port_check_device_control metrics and docker logs.

      - alert: NetPortDatabaseDown
        expr: net_port_check_database == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: Net Port database unreachable
          description: Backend cannot reach PostgreSQL (net_port_check_database=0).

      - alert: NetPortDeviceControlDown
        expr: net_port_check_device_control == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: Device control port 8443 unreachable
          description: TCP check to DEVICE_CONTROL_HOST:DEVICE_CONTROL_PORT failed.

      - alert: NetPortDevicesOffline
        expr: net_port_devices_offline > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Devices offline (no heartbeat)
          description: >-
            {{ $value }} device(s) in active status without heartbeat in the last 2 minutes.

      - alert: NetPortRegistrationErrorsHigh
        expr: increase(net_port_registration_errors_total[10m]) > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: High registration error rate on port 8443
          description: >-
            More than 10 registration-related log errors in 10 minutes
            (auth failures, port allocation, JSON errors). Check C server logs in /root/net_port/logs.

      - alert: NetPortNoFreePorts
        expr: net_port_ports_available < 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Low free device ports
          description: Fewer than 5 free ports in range 6000-6998 (current {{ $value }}).

      - alert: NetPortNoFreePortsCritical
        expr: net_port_ports_available == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: No free device ports
          description: Port pool exhausted; new device registrations may fail.

      - alert: NetPortHighConnecting
        expr: net_port_devices_connecting > 10
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Many devices stuck in connecting
          description: "{{ $value }} devices in connecting state for over 10 minutes."

      - alert: NetPortStaleConnecting
        expr: net_port_devices_stale_connecting > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Devices stuck in connecting (registration not completing)
          description: >-
            {{ $value }} device(s) in connecting status for more than 10 minutes — client may not reach 8443.

      - alert: NetPortSessionsWithoutOnlineDevices
        expr: net_port_sessions_active > 0 and net_port_devices_online == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Active sessions but no online devices
          description: Possible stale sessions or heartbeat issues.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: net_port
    metrics_path: /metrics
    scrape_interval: 15s
    static_configs:
      - targets: ['net_port:8080']
        labels:
          service: net_port

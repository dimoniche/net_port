services:
  net_port:
    build:
      context: .
      dockerfile: Dockerfile
    image: net_port:latest
    container_name: net_port_app
    ports:
      - "13080:80"
      - "13880:8080"
      - "49000-49099:6000-6099"
      - "15432:5432"
      - "8443:8443"

services:
  net_port:
    build:
      context: .
      dockerfile: Dockerfile
    image: net_port:latest
    container_name: net_port_app
    ports:
      - "13080:80"
      - "13880:8080"
      - "49000-49099:6000-6099"
      - "15432:5432"
      - "8443:8443"
      - "9099:9090"
    environment:
      - JWT_SECRET=${JWT_SECRET:-}
      - JWT_SECRET_PREVIOUS=${JWT_SECRET_PREVIOUS:-}
      - NODE_ENV=production
      - DB_USER=admin
      - DB_PASSWORD=lbvsx123
      - DB_HOST=192.168.0.132
      - DB_PORT=5432
      - APP_USER=admin
      - APP_PASSWORD=lbvsx123
      - THREADS=10
      - NET_PORT_BIND_ADDRESS=0.0.0.0
      - DEVICE_CONTROL_HOST=127.0.0.1
      - DEVICE_CONTROL_PORT=8443
      - METRICS_CACHE_MS=5000
      - PUBLIC_REGISTRATION_PORT=8443
      - PUBLIC_PORT_HOST_BASE=49000
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: net_port_prometheus
    profiles:
      - monitoring
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/prometheus/alerts:/etc/prometheus/alerts:ro
    depends_on:
      - net_port
    restart: unless-stopped
